project: JUI
description: "AI-first Julia TUI framework — ET always-on, FRANK orthogonal diagnostics. Single build: Unix socket (local) + TCP (remote), zero mode switch."

phases:
  - id: phase-1
    name: "Phase 1: Extracted from Igor — Standalone Scaffold"
    status: completed
    depends_on: []
    items:
      - name: "Extract JUI from Igor monorepo"
        done: true
      - name: "Project scaffold (CLAUDE.md, ROADMAP.yaml, README.md)"
        done: true
      - name: "4 core components: InputComponent, OutputComponent, StatusBar, HistoryPanel"
        done: true
      - name: "App struct + render_screen! full-layout composer"
        done: true
      - name: "ANSI 256-color palette + box-drawing primitives"
        done: true
      - name: "FRANK integration: all state changes emit events"
        done: true
      - name: "Main event loop (run!)"
        done: true
      - name: "Forgejo repo created (http://192.168.14.77:3000/eidos/JUI)"
        done: true
      - name: "TECH DEBT: Igor-specific fields in StatusBar (wiq_score, confidence) — mark for Phase 2c"
        done: true

  - id: phase-2a
    name: "Phase 2a: AppState Pure Struct (Prerequisite for ET + Optional FRANK)"
    status: not-started
    depends_on: [phase-1]
    items:
      - name: "Extract AppState as pure data struct (zero IO, serializable)"
        done: false
      - name: "All component state moved into AppState fields"
        done: false
      - name: "AppState is the load-bearing prerequisite for ET-transport and FRANK"
        done: false
      - name: "Full serde support (JSON marshaling for ET snapshots)"
        done: false

  - id: phase-2b
    name: "Phase 2b: Renderer Decoupled (Testable Output)"
    status: not-started
    depends_on: [phase-2a]
    items:
      - name: "Renderer takes Writer parameter instead of hardcoded stdout"
        done: false
      - name: "Kill all print(stdout, ...) direct calls (~15 sites)"
        done: false
      - name: "render_screen!(writer, state) → pure rendering, testable diffs"
        done: false
      - name: "Tests verify output without side effects"
        done: false

  - id: phase-2c
    name: "Phase 2c: Generalize Components + FRANK Optional"
    status: not-started
    depends_on: [phase-2b]
    items:
      - name: "Remove Igor-specific fields from StatusBar (wiq_score, confidence, model → generic)"
        done: false
      - name: "Generic StatusBar: key-value pairs, caller defines fields"
        done: false
      - name: "Make FRANK a weak/optional dependency (Julia ext mechanism)"
        done: false
      - name: "JUI works fully with zero FRANK present (no debug events, no crash)"
        done: false
      - name: "Generic prompt string (not hardcoded 'igor>')"
        done: false
      - name: "Component registry: allow callers to add custom components"
        done: false
      - name: "Layout engine: configurable proportions (not hardcoded 30/70 split)"
        done: false
      - name: "run! callback API: caller provides on_input handler, not hardcoded echo"
        done: false
      - name: "Unit tests for all components (no Igor deps)"
        done: false

  - id: phase-3
    name: "Phase 3: ET-Transport (Unix Socket Local + TCP Remote, Single Build)"
    status: not-started
    depends_on: [phase-2c]
    items:
      - name: "ET-transport always ON — single build, no mode switch"
        done: false
      - name: "Transport abstraction: Unix socket for local, TCP for remote"
        done: false
      - name: "SessionID + AppState snapshot on connect (framebuffer diff for reconnect)"
        done: false
      - name: "Event-replay optional (framebuffer diff preferred for ET)"
        done: false
      - name: "run!() spawns server + local client automatically"
        done: false
      - name: "Remote: swap Transport URL, user API identical"
        done: false
      - name: "Zero overhead for local (Unix socket vs stdlib TCPSocket comparison)"
        done: false
      - name: "Integration tests: local and remote modes"
        done: false

  - id: phase-4
    name: "Phase 4: eidos Julia Registry Publish"
    status: not-started
    depends_on: [phase-3]
    items:
      - name: "Register FRANK package in eidos Forgejo Julia registry"
        done: false
      - name: "Register JUI package in eidos Forgejo Julia registry"
        done: false
      - name: "Update Project.toml registry entries"
        done: false
      - name: "Usage docs: quick-start example app with ET sessions"
        done: false
      - name: "CHANGELOG.md v0.1 → v0.4"
        done: false
      - name: "Validate: Igor and future consumers install via registry (not path deps)"
        done: false
